<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    .card {
      background: #fff;
      width: 360px;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 24px;
      color: #333;
    }

    input {
      display: block;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 16px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #1677ff;
    }

    button {
      display: block;
      width: 100%;
      padding: 10px;
      background: #1677ff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #0958d9;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #555;
    }

    .remember input[type="checkbox"] {
      width: auto;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>登录</h1>
    <input type="text" placeholder="用户名">
    <input type="password" placeholder="密码">
    <div class="remember">
      <input type="checkbox" id="remember">
      <label for="remember">记住我</label>
    </div>
    <button type="button">登录</button>
  </div>
</body>
</html>

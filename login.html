<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1e1e2e;
      margin-bottom: 28px;
      text-align: center;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      color: #1e1e2e;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #4F46E5;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input[type="password"],
    .password-wrapper input[type="text"] {
      padding-right: 44px;
    }

    #toggle-pwd {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px;
      color: #6b7280;
    }

    #toggle-pwd:hover {
      color: #4F46E5;
    }

    .error-msg {
      font-size: 0.875rem;
      color: #ef4444;
      min-height: 1.25rem;
      margin-bottom: 12px;
    }

    #submit-btn {
      width: 100%;
      padding: 12px;
      background: #4F46E5;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    #submit-btn:hover:not(:disabled) {
      background: #4338ca;
    }

    #submit-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .success-msg {
      color: #16a34a;
      font-weight: 600;
      text-align: center;
      margin-top: 12px;
      font-size: 1rem;
    }

    /* 可访问性：focus-visible 样式 */
    input[type="text"]:focus,
    input[type="password"]:focus {
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.25);
    }

    #toggle-pwd:focus-visible {
      outline: 2px solid #4F46E5;
      outline-offset: 2px;
      border-radius: 4px;
    }

    #submit-btn:focus-visible {
      outline: 2px solid #4F46E5;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>登录</h1>
    <form id="login-form" novalidate>
      <div class="field">
        <label for="username">用户名</label>
        <input
          type="text"
          id="username"
          name="username"
          autocomplete="username"
          placeholder="请输入用户名"
          aria-required="true"
        />
      </div>
      <div class="field password-field">
        <label for="password">密码</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="请输入密码（至少 6 位）"
            aria-required="true"
          />
          <button type="button" id="toggle-pwd" aria-label="切换密码可见性">👁</button>
        </div>
      </div>
      <p class="error-msg" id="error-msg" role="alert"></p>
      <button type="submit" id="submit-btn">登录</button>
    </form>
  </div>

  <script>
    (function () {
      'use strict';

      const form = document.getElementById('login-form');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const toggleBtn = document.getElementById('toggle-pwd');
      const errorMsg = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');

      // ── 错误提示工具 ──────────────────────────────────────────
      function showError(msg) {
        errorMsg.textContent = msg;
      }

      function clearError() {
        errorMsg.textContent = '';
      }

      // 输入框 focus 时清除错误
      usernameInput.addEventListener('focus', clearError);
      passwordInput.addEventListener('focus', clearError);

      // ── 密码可视性切换 ────────────────────────────────────────
      toggleBtn.addEventListener('click', function () {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        toggleBtn.textContent = isPassword ? '🙈' : '👁';
      });

      // ── 表单验证 ──────────────────────────────────────────────
      function validate() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username) {
          showError('请输入用户名');
          usernameInput.focus();
          return false;
        }
        if (!password) {
          showError('请输入密码');
          passwordInput.focus();
          return false;
        }
        if (password.length < 6) {
          showError('密码至少 6 位');
          passwordInput.focus();
          return false;
        }
        return true;
      }

      // ── 表单提交 ──────────────────────────────────────────────
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearError();

        try {
          if (!validate()) return;

          // 模拟 loading 状态
          submitBtn.disabled = true;
          submitBtn.textContent = '登录中…';

          setTimeout(function () {
            submitBtn.disabled = false;
            submitBtn.textContent = '登录';

            // 展示成功提示
            clearError();
            const successEl = document.createElement('p');
            successEl.className = 'success-msg';
            successEl.textContent = '登录成功 ✓';
            // 若已存在成功提示则替换
            const existing = form.querySelector('.success-msg');
            if (existing) existing.remove();
            form.appendChild(successEl);
          }, 500);
        } catch (err) {
          showError('发生未知错误，请重试');
          submitBtn.disabled = false;
          submitBtn.textContent = '登录';
        }
      });
    }());
  </script>
</body>
</html>
